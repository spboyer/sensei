name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, such as v1.5.0.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.event.release.tag_name || inputs.tag, 'v')
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix scripts

      - name: Verify tag matches package version
        id: package
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          tag_version="${RELEASE_TAG#v}"

          if [[ "$package_version" != "$tag_version" ]]; then
            echo "Tag $RELEASE_TAG does not match package.json version $package_version" >&2
            exit 1
          fi

          echo "name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Verify package
        run: npm run build && npm test

      - name: Check npm version
        id: npm
        run: |
          package="${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"

          if npm view "$package" version >/dev/null 2>&1; then
            echo "$package is already published; skipping npm publish."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "$package is not published yet."
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.npm.outputs.published == 'false'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
